<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheraGraph AI — Protocol-Locked Clinical Intelligence</title>
<meta name="description" content="The clinical AI that only knows what your institution knows. Patient-contextual drug interaction reasoning, locked to your protocols, running entirely inside your perimeter.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TheraGraph AI — design system (per Design_WEB_directions)
   60% white/light · 30% navy/slate structure · 10% teal pop
   ============================================================ */
:root{
  --navy:#0B1F33;
  --navy-2:#0E2A45;
  --teal:#0E7C86;
  --cyan:#13A3AE;
  --slate:#33475B;
  --grey:#6B7A8D;
  --line:#C9D6DE;
  --pale-teal:#EAF3F4;
  --off-white:#F2F6F8;
  --white:#FFFFFF;
  --maxw:1240px;
  --r:8px;
  --shadow-sm:0 1px 2px rgba(11,31,51,.06),0 2px 8px rgba(11,31,51,.05);
  --shadow-md:0 8px 30px rgba(11,31,51,.08),0 2px 8px rgba(11,31,51,.05);
  --shadow-lg:0 24px 60px rgba(11,31,51,.14),0 8px 24px rgba(11,31,51,.08);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--slate);background:var(--white);line-height:1.55;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  font-size:16.5px;overflow-x:hidden;
}
h1,h2,h3,h4{color:var(--navy);line-height:1.12;margin:0;letter-spacing:-.02em;font-weight:700}
h1{font-size:clamp(2.1rem,4.6vw,3.5rem);font-weight:800}
h2{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:700;letter-spacing:-.025em}
h3{font-size:1.22rem;font-weight:600;letter-spacing:-.01em}
p{margin:0 0 1rem;max-width:72ch}
a{color:var(--teal);text-decoration:none;transition:color .2s}
a:hover{color:var(--cyan)}
img{max-width:100%}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px}
.eyebrow{font-size:.8rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin:0 0 14px}
.lede{font-size:clamp(1.05rem,1.6vw,1.32rem);color:var(--slate);max-width:60ch;font-weight:400}
.muted{color:var(--grey)}
.caption{font-size:.85rem;color:var(--grey)}
.center{text-align:center}
.center .lede,.center p{margin-left:auto;margin-right:auto}
section{position:relative}
.section-pad{padding:clamp(64px,9vw,120px) 0}
.band-off{background:var(--off-white)}
.band-navy{background:var(--navy);color:#C6D4E0}
.band-navy h1,.band-navy h2,.band-navy h3{color:#fff}
.band-navy .eyebrow{color:var(--cyan)}
.band-pale{background:var(--pale-teal)}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:9px;font:inherit;font-weight:600;font-size:.97rem;
  padding:13px 24px;border-radius:var(--r);cursor:pointer;border:2px solid transparent;
  transition:all .2s var(--ease);white-space:nowrap;line-height:1}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--cyan);color:#fff;transform:translateY(-1px);box-shadow:0 8px 20px rgba(14,124,134,.3)}
.btn-secondary{background:transparent;border-color:var(--teal);color:var(--teal)}
.btn-secondary:hover{background:rgba(14,124,134,.07);color:var(--teal)}
.btn-ghost{background:transparent;color:var(--teal);padding:13px 4px}
.btn-ghost:hover{gap:13px}
.band-navy .btn-secondary{border-color:rgba(255,255,255,.5);color:#fff}
.band-navy .btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn svg{width:17px;height:17px;transition:transform .2s var(--ease)}
.btn-ghost:hover svg,.btn-primary:hover svg{transform:translateX(3px)}

/* ---------- nav ---------- */
header.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.82);
  backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid transparent;transition:all .25s}
header.nav.scrolled{border-bottom-color:var(--line);box-shadow:var(--shadow-sm)}
.nav-inner{max-width:var(--maxw);margin:0 auto;padding:14px 32px;display:flex;align-items:center;gap:36px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.brand svg{width:32px;height:32px;flex:none}
.brand .wm{font-weight:800;font-size:1.18rem;letter-spacing:-.03em;display:flex;align-items:baseline;line-height:1}
.wm .t1{color:var(--navy)}.wm .t2{color:var(--teal)}
.wm .t3{font-size:.62em;color:var(--grey);font-weight:700;transform:translateY(-.55em);margin-left:1px}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-item{position:relative}
.nav-item>a{display:flex;align-items:center;gap:5px;padding:10px 15px;color:var(--slate);font-weight:500;font-size:.95rem;border-radius:6px;cursor:pointer}
.nav-item>a:hover{color:var(--navy);background:var(--off-white)}
.nav-item>a svg{width:13px;height:13px;opacity:.6;transition:transform .2s}
.nav-item:hover>a svg{transform:rotate(180deg)}
.dropdown{position:absolute;top:calc(100% + 8px);left:0;min-width:280px;background:#fff;border:1px solid var(--line);
  border-radius:12px;box-shadow:var(--shadow-lg);padding:8px;opacity:0;visibility:hidden;transform:translateY(8px);
  transition:all .2s var(--ease)}
.nav-item:hover .dropdown{opacity:1;visibility:visible;transform:translateY(0)}
.dropdown a{display:block;padding:11px 14px;border-radius:8px;color:var(--slate);font-size:.92rem;font-weight:500}
.dropdown a:hover{background:var(--off-white);color:var(--navy)}
.dropdown a span{display:block;font-size:.79rem;color:var(--grey);font-weight:400;margin-top:2px}
.nav-cta{margin-left:8px}
.burger{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--navy)}
.burger svg{width:26px;height:26px}

/* ---------- hero ---------- */
.hero{position:relative;overflow:hidden;background:var(--white);padding-top:clamp(40px,6vw,72px)}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;min-height:min(78vh,720px)}
.hero h1{margin-bottom:22px}
.hero .lede{margin-bottom:32px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px}
.hero-micro{font-size:.88rem;color:var(--grey);display:flex;align-items:center;gap:8px}
.hero-micro svg{width:15px;height:15px;color:var(--teal)}
.hero-visual{position:relative;height:100%;min-height:440px}
.bg-mesh{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.55}
.bg-mesh::before{content:"";position:absolute;width:760px;height:760px;right:-200px;top:-260px;border-radius:50%;
  background:radial-gradient(circle,rgba(19,163,174,.13),transparent 62%)}
.bg-mesh::after{content:"";position:absolute;width:560px;height:560px;left:-180px;bottom:-220px;border-radius:50%;
  background:radial-gradient(circle,rgba(11,31,51,.07),transparent 60%)}

/* ---------- closed-system diagram ---------- */
.vault-diagram{width:100%;height:auto;display:block;filter:drop-shadow(0 24px 50px rgba(11,31,51,.13))}
.vd-flow{stroke-dasharray:5 5;animation:dash 1.6s linear infinite}
@keyframes dash{to{stroke-dashoffset:-20}}
.vd-pulse{transform-box:fill-box;transform-origin:center;animation:pulse 3s var(--ease) infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.vd-blocked{animation:blink 2.4s steps(1) infinite}
@keyframes blink{0%,70%{opacity:1}71%,100%{opacity:.25}}

/* ---------- generic blocks ---------- */
.grid{display:grid;gap:28px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:30px;transition:all .25s var(--ease)}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px);border-color:#b3c5d0}
.card .ico{width:46px;height:46px;border-radius:11px;background:var(--pale-teal);display:grid;place-items:center;margin-bottom:18px}
.card .ico svg{width:23px;height:23px;color:var(--teal)}
.card h3{margin-bottom:9px}
.card p{font-size:.96rem;margin-bottom:0;color:var(--slate)}
.card.feature{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal)}
.card.feature .tag{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--teal);background:var(--pale-teal);padding:4px 10px;border-radius:20px;margin-bottom:14px}

/* callout — signature left bar */
.callout{background:var(--pale-teal);border-left:4px solid var(--teal);padding:24px 28px;border-radius:0 var(--r) var(--r) 0}
.callout h3{margin-bottom:8px}
.callout p:last-child{margin-bottom:0}

/* contrast comparison */
.compare{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.compare .col{padding:30px 26px;border-right:1px solid var(--line)}
.compare .col:last-child{border-right:none;background:var(--pale-teal)}
.compare .col h4{font-size:1.02rem;margin-bottom:14px}
.compare .col.win h4{color:var(--teal)}
.compare .col p{font-size:.92rem;color:var(--slate);margin:0}
.compare .badge{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);display:block;margin-bottom:6px}
.compare .col.win .badge{color:var(--teal)}

/* steps */
.steps{counter-reset:s;display:grid;gap:18px}
.step{display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start;background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px 26px}
.step .num{counter-increment:s;width:38px;height:38px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:700;font-size:.95rem}
.step .num::before{content:counter(s)}
.step h3{margin-bottom:5px;font-size:1.05rem}
.step p{font-size:.94rem;margin:0}

/* data table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px}
table.data{width:100%;border-collapse:collapse;min-width:560px}
table.data th{background:var(--navy);color:#fff;padding:15px 18px;text-align:left;font-size:.9rem;font-weight:600}
table.data td{padding:15px 18px;border-bottom:1px solid var(--line);font-size:.93rem;color:var(--slate);vertical-align:top}
table.data tr:nth-child(even) td{background:var(--off-white)}
table.data tr:last-child td{border-bottom:none}
table.data .lead{font-weight:600;color:var(--navy)}

/* stat row */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.stat{padding:8px 0}
.stat .big{font-size:clamp(2.2rem,4vw,3.2rem);font-weight:800;color:var(--navy);letter-spacing:-.03em;line-height:1}
.band-navy .stat .big{color:#fff}
.stat .big em{color:var(--teal);font-style:normal}
.band-navy .stat .big em{color:var(--cyan)}
.stat .lbl{margin-top:8px;font-size:.92rem;color:var(--grey)}
.band-navy .stat .lbl{color:#9FB3C4}

/* perimeter-wrapped block (vault motif) */
.vault-box{border:1px solid var(--line);border-radius:14px;padding:32px;position:relative;background:#fff}
.vault-box::before{content:"";position:absolute;inset:9px;border:1px dashed var(--line);border-radius:9px;pointer-events:none}
.vault-box .inner{position:relative}

/* commitments list */
.commit{display:grid;gap:14px}
.commit li{list-style:none;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start;
  padding:18px 22px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px}
.commit li .ck{width:26px;height:26px;border-radius:50%;background:rgba(19,163,174,.18);display:grid;place-items:center;flex:none;margin-top:1px}
.commit li .ck svg{width:15px;height:15px;color:var(--cyan)}
.commit li b{color:#fff;font-weight:600}
.commit li span{color:#A9BECE;font-size:.95rem}

/* persona / module grid items reuse .card */
/* CTA band */
.cta-band{background:var(--navy);color:#fff;border-radius:20px;padding:clamp(40px,6vw,68px);text-align:center;position:relative;overflow:hidden}
.cta-band::before{content:"";position:absolute;width:560px;height:560px;left:50%;top:-60%;transform:translateX(-50%);
  background:radial-gradient(circle,rgba(19,163,174,.22),transparent 60%)}
.cta-band>*{position:relative}
.cta-band h2{color:#fff;margin-bottom:14px}
.cta-band p{color:#B9CAD8;margin:0 auto 28px;max-width:52ch}
.cta-band .hero-cta{justify-content:center}

/* footer */
footer.ft{background:#08182A;color:#90A4B6;padding:64px 0 30px}
.ft-top{display:grid;grid-template-columns:1.4fr repeat(4,1fr);gap:34px;padding-bottom:44px;border-bottom:1px solid rgba(255,255,255,.09)}
.ft .brand .wm .t1{color:#fff}.ft .brand .wm .t3{color:#7d93a6}
.ft-tag{margin:16px 0 0;font-size:.92rem;color:#7d93a6;max-width:30ch}
.ft h4{color:#fff;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;font-weight:600}
.ft ul{list-style:none;margin:0;padding:0;display:grid;gap:10px}
.ft ul a{color:#90A4B6;font-size:.92rem}
.ft ul a:hover{color:#fff}
.ft-bot{padding-top:26px;display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;font-size:.84rem;color:#647c90}
.ft-disclaim{max-width:62ch}

/* reveal on scroll */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.08s}.reveal.d2{transition-delay:.16s}.reveal.d3{transition-delay:.24s}.reveal.d4{transition-delay:.32s}

/* page intro */
.page-head{padding:clamp(48px,7vw,88px) 0 0}
.page-head .eyebrow{margin-bottom:16px}
.breadcrumb{font-size:.84rem;color:var(--grey);margin-bottom:18px}
.breadcrumb a{color:var(--grey)}.breadcrumb a:hover{color:var(--teal)}

/* legal prose */
.prose h2{font-size:1.4rem;margin:34px 0 12px}
.prose h3{margin:24px 0 8px}
.prose p,.prose li{font-size:1rem;color:var(--slate)}
.prose ul{padding-left:20px}
.note-inline{background:var(--off-white);border:1px solid var(--line);border-radius:10px;padding:16px 20px;font-size:.92rem;color:var(--grey);margin:20px 0}

/* form */
.form{display:grid;gap:16px;max-width:520px}
.field label{display:block;font-size:.86rem;font-weight:600;color:var(--navy);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;
  font:inherit;font-size:.95rem;color:var(--slate);background:#fff;transition:border .2s,box-shadow .2s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,124,134,.12)}
.consent{display:flex;gap:10px;align-items:flex-start;font-size:.85rem;color:var(--grey)}
.consent input{width:auto;margin-top:3px}

/* tier evidence pills */
.tier{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-right:8px}
.tier.t1{background:#E3F2E8;color:#2E7D4F}
.tier.t2{background:#E5EEF6;color:#2C5F8A}
.tier.t3{background:#FBF0E2;color:#9A6B12}
.tier.t4{background:#F0EAF6;color:#6B4A8A}

/* pill row */
.pillrow{display:flex;flex-wrap:wrap;gap:10px}
.pill{border:1px solid var(--line);background:#fff;border-radius:30px;padding:8px 16px;font-size:.85rem;font-weight:500;color:var(--slate)}
.band-navy .pill{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.16);color:#C6D4E0}

/* split visual two-buildings */
.twin{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.twin .bld{border:1px solid var(--line);border-radius:14px;padding:26px;text-align:center;background:#fff}
.twin .bld svg{width:100%;height:150px}

hr.rule{border:none;border-top:1px solid var(--line);margin:0}
.section-head{max-width:62ch;margin-bottom:44px}
.section-head.center{margin-left:auto;margin-right:auto}

@media(max-width:980px){
  .hero-grid{grid-template-columns:1fr;gap:36px;min-height:auto;padding-bottom:20px}
  .hero-visual{min-height:340px;order:2}
  .g4{grid-template-columns:repeat(2,1fr)}
  .ft-top{grid-template-columns:1fr 1fr}
  .stats{grid-template-columns:1fr 1fr}
}
@media(max-width:760px){
  .wrap{padding:0 22px}.nav-inner{padding:13px 22px}
  .nav-links{position:fixed;inset:62px 0 auto;flex-direction:column;align-items:stretch;background:#fff;
    border-bottom:1px solid var(--line);padding:14px 22px 22px;gap:2px;box-shadow:var(--shadow-md);
    transform:translateY(-120%);transition:transform .3s var(--ease);margin-left:0}
  .nav-links.open{transform:none}
  .nav-item>a{padding:13px 8px}.dropdown{position:static;opacity:1;visibility:visible;transform:none;
    box-shadow:none;border:none;padding:0 0 8px 14px;min-width:0}
  .nav-item:hover>a svg{transform:none}
  .burger{display:block;margin-left:auto}
  .nav-cta{display:none}
  .g2,.g3,.g4,.compare,.twin,.stats{grid-template-columns:1fr}
  .compare .col{border-right:none;border-bottom:1px solid var(--line)}
  .ft-top{grid-template-columns:1fr}
}
</style>
</head>
<body>
<!-- shared SVG defs: logo mark used in nav + footer -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<g id="tg-mark">
  <line x1="45" y1="20" x2="105" y2="45"/><line x1="105" y1="45" x2="80" y2="100"/>
  <line x1="80" y1="100" x2="20" y2="80"/><line x1="20" y1="80" x2="45" y2="20"/>
  <line x1="20" y1="80" x2="105" y2="45"/>
  <circle cx="45" cy="20" r="10"/><circle cx="105" cy="45" r="10"/>
  <circle cx="80" cy="100" r="10"/><circle cx="20" cy="80" r="10"/>
</g>
</defs></svg>

<div id="app"></div>
<script>
/* ============================================================
   TheraGraph site — hash router + page registry
   ============================================================ */
const ICONS = {
  chevron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>',

  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>',
  graph:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M6.7 7.4l4.6 9.2M17.3 7.4l-4.6 9.2M7 6h10"/></svg>',
  pill:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="8" rx="4" transform="rotate(45 12 12)"/><path d="M8.5 8.5l7 7"/></svg>',
  layers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5M3 17l9 5 9-5"/></svg>',
  plug:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2v6M15 2v6M7 8h10v3a5 5 0 01-10 0V8zM12 16v6"/></svg>',

  // burger
  const b=document.getElementById('burger'),nl=document.getElementById('navlinks');
  if(b)b.onclick=()=>nl.classList.toggle('open');
  // links
  app.querySelectorAll('[data-link]').forEach(el=>{
    el.style.cursor='pointer';
    el.addEventListener('click',e=>{e.preventDefault();location.hash='#'+el.getAttribute('data-link');});
  });
  // form
  const f=document.getElementById('briefingForm');
  if(f)f.addEventListener('submit',()=>{document.getElementById('formNote').style.display='block';f.reset();});
}
let io;
function observeReveals(){
  if(io)io.disconnect();
  io=new IntersectionObserver(es=>es.forEach(en=>{if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);}}),{threshold:.12});
  document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));
}
window.addEventListener('hashchange',render);
render();
</script>
